<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recupero Password - Aeroclub Varese</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* SFONDO SFOCATO */
        .background-blur {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 31, 63, 0.75), rgba(0, 31, 63, 0.75)), 
                        url('https://i.ibb.co/nqvwwYNv/Senza-titolo-2.jpg'); 
            background-size: cover;
            background-position: center;
            filter: blur(10px); 
            transform: scale(1.1);
            z-index: -1;
        }

        .container { 
            background: rgba(255, 255, 255, 0.96); 
            border-radius: 30px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
            width: 90%;
            max-width: 400px; 
            text-align: center; 
            padding: 40px 30px;
            animation: fadeIn 0.8s ease-out;
            position: relative;
            z-index: 1;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* LOGO */
        .logo-header {
            width: 150px; 
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        h2 { color: #001f3f; margin: 0; font-size: 1.7em; font-weight: 800; }
        
        input { 
            width: 100%; 
            padding: 14px 20px; 
            margin: 20px 0; 
            border: 1.5px solid #ddd; 
            border-radius: 50px; 
            box-sizing: border-box; 
            font-size: 1em;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus { border-color: #001f3f; box-shadow: 0 0 8px rgba(0,31,63,0.2); }

        button { 
            width: 100%; 
            padding: 16px; 
            background: #001f3f; 
            color: white; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1.1em;
            text-transform: uppercase; 
            transition: transform 0.2s, background 0.3s;
        }

        button:hover { background: #003366; transform: translateY(-2px); }
        button:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        .back-link { 
            display: block; 
            margin-top: 20px; 
            font-size: 0.95em; 
            color: #001f3f; 
            text-decoration: none; 
            font-weight: 500;
        }

        /* STILE MODAL */
        #custom-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 31, 63, 0.95); z-index: 9999; justify-content: center; align-items: center;
        }
        .modal-content { background: white; padding: 40px; border-radius: 30px; width: 85%; max-width: 400px; text-align: center; }
        .icon-check { font-size: 50px; margin-bottom: 15px; }
        .spam-alert { 
            background: #fff4e5; border-left: 5px solid #ff9800; padding: 15px; 
            margin: 20px 0; text-align: left; border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="background-blur"></div>

<div id="custom-modal">
    <div class="modal-content">
        <div class="icon-check">✉️</div>
        <h2 style="color: #001f3f; margin-bottom: 5px;">Email Inviata!</h2>
        <p style="color: #666; font-size: 0.9em; margin-top: 0;">Email Sent Successfully!</p>
        
        <div class="spam-alert">
            <p style="margin: 0; font-size: 0.9em; color: #856404; line-height: 1.4;">
                <strong>IMPORTANTE:</strong> Controlla la cartella <strong>SPAM</strong>.<br>
                <span style="font-style: italic; font-size: 0.85em;">Check your <strong>SPAM</strong> folder.</span>
            </p>
        </div>

        <button onclick="window.location.href='index.html'">Torna al Login</button>
    </div>
</div>

<div class="container">
    <img src="https://i.ibb.co/nqvwwYNv/Senza-titolo-2.jpg" class="logo-header" alt="Logo">
    
    <h2>Recupero Password</h2>
    <p style="font-size: 0.85em; color: #666; margin-bottom: 10px;">
        Inserisci la tua email per il reset.<br>
        <i>Enter email for reset link.</i>
    </p>
    
    <input type="email" id="email-recupero" placeholder="La tua email / Your email">
    <button id="submit-btn" onclick="sendReset()">Invia Link / Send Link</button>
    
    <a href="index.html" class="back-link">← Torna al Login / Back to Login</a>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDqy6CFoufHVlqT94GdurCMzcmPFv-VprM",
        authDomain: "quiz-ppl-varese.firebaseapp.com",
        projectId: "quiz-ppl-varese",
        storageBucket: "quiz-ppl-varese.firebasestorage.app",
        messagingSenderId: "784406293571",
        appId: "1:784406293571:web:dd28c5574910502891b8f6"
    };
    firebase.initializeApp(firebaseConfig);

    async function sendReset() {
        const emailInput = document.getElementById('email-recupero');
        const email = emailInput.value.trim();
        const btn = document.getElementById('submit-btn');

        if (!email || !email.includes("@")) {
            alert("Per favore, inserisci un indirizzo email valido.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Invio in corso...";

        try {
            await firebase.auth().sendPasswordResetEmail(email);
            document.getElementById('custom-modal').style.display = 'flex';
        } catch (error) {
            btn.disabled = false;
            btn.innerText = "Invia Link / Send Link";
            if (error.code === 'auth/user-not-found') {
                alert("Email non trovata.");
            } else {
                alert("Errore: " + error.message);
            }
        }
    }
</script>

</body>
</html>
