<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ricerca Database Quiz PPL - Aeroclub Varese</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDqy6CFoufHVlqT94GdurCMzcmPFv-VprM",
            authDomain: "quiz-ppl-varese.firebaseapp.com",
            projectId: "quiz-ppl-varese",
            storageBucket: "quiz-ppl-varese.firebasestorage.app",
            messagingSenderId: "784406293571",
            appId: "1:784406293571:web:dd28c5574910502891b8f6"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const auth = firebase.auth();
        const LOGIN_URL = "https://aviationaccount.github.io/Quiz-PPL-Aeroclub-Varese/index.html";
        let quizData = []; 

        auth.onAuthStateChanged((user) => {
            const content = document.getElementById('protected-content');
            if (user) {
                if (content) content.style.display = 'block';
                if (quizData.length === 0) loadCSV();
            } else {
                window.location.replace(LOGIN_URL);
            }
        });

        // Funzione per chiudere la finestra
        function closeWindow() {
            window.close();
            // Fallback se il browser blocca window.close()
            setTimeout(() => {
                window.location.href = LOGIN_URL;
            }, 500);
        }
    </script>

    <style>
        :root {
            --primary: #0072ff;
            --accent: #00d2ff;
            --dark-bg: #141E30;
            --dark-blue: #243B55;
            --danger: #dc3545;
            --white: #ffffff;
            --text-dark: #1e293b;
            --gray-light: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(120deg, var(--dark-bg), var(--dark-blue));
            color: var(--white);
            margin: 0;
            min-height: 100vh;
        }

        #protected-content { display: none; padding: 40px 0; }

        .main-container {
            max-width: 1000px;
            width: 92%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            padding: 40px;
            box-sizing: border-box;
            color: var(--text-dark);
            margin: 0 auto;
        }

        .header-box { text-align: center; margin-bottom: 30px; position: relative; }
        
        /* Stile pulsante CHIUDI */
        .btn-close { 
            position: absolute; top: 0; left: 0; 
            background: var(--danger); 
            color: white; border: none; 
            padding: 10px 18px; border-radius: 12px; 
            cursor: pointer; font-size: 0.9rem; font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(220, 53, 69, 0.2);
        }
        .btn-close:hover { background: #b02a37; transform: translateY(-2px); }

        .search-icon {
            width: 60px;
            height: 60px;
            fill: var(--primary);
            margin-bottom: 10px;
        }

        h1 { color: var(--primary); font-size: 1.8rem; margin: 10px 0; font-weight: 800; }

        .search-container { 
            background-color: var(--gray-light);
            padding: 25px; border-radius: 16px; display: flex; 
            flex-wrap: wrap; gap: 15px; border: 1px solid #e2e8f0; margin-bottom: 30px;
        }

        .search-container input { 
            padding: 12px 15px; border: 2px solid #cbd5e1; border-radius: 10px; 
            font-size: 16px; flex-grow: 1; outline: none;
        }
        .search-container input:focus { border-color: var(--primary); }

        .search-container button {
            padding: 0 25px; height: 48px; background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer;
        }

        .quiz-result {
            border: 1px solid #e2e8f0; padding: 25px; margin: 20px 0; 
            border-radius: 16px; background: white; text-align: left;
        }

        .correct-answer {
            background-color: #ecfdf5 !important; color: #065f46 !important;
            border: 1px solid #10b981 !important; font-weight: 600; padding: 10px; border-radius: 8px;
        }

        ul { list-style: none; padding: 0; }
        li { padding: 8px 0; color: #475569; border-bottom: 1px solid #f1f5f9; }

        footer { text-align: center; margin-top: 40px; font-size: 0.8rem; color: #94a3b8; padding-bottom: 40px; }
    </style>
</head>
<body>

    <div id="protected-content">
        <div class="main-container">
            <div class="header-box">
                <button class="btn-close" onclick="closeWindow()">✖ CHIUDI</button>
                
                <svg class="search-icon" viewBox="0 0 24 24">
                    <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
                
                <h1>Ricerca Database Quiz</h1>
            </div>

            <div class="search-container">
                <input type="text" id="searchText" placeholder="Parole chiave nel testo...">
                <input type="text" id="searchId" placeholder="Cerca per ID">
                <button onclick="handleSearch()">Cerca</button>
                <button onclick="resetSearch()" style="background:#cbd5e1; color:#444;">Reset</button>
            </div>

            <div id="results">
                <p style="text-align:center; color:#666;">In attesa di ricerca...</p>
            </div>
        </div>

        <footer>
            © 2026 by A.D per Aeroclub di Varese. <br> Accesso riservato agli allievi autorizzati.
        </footer>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ7nj9UrBloRfIDxZkRUkxBu1neSuPIyaR4EjBWj90BLyDK3VkOBeqZSxe2pb1jwkE7mIEelHXhzayP/pub?output=csv';

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I'))) e.preventDefault();
            if (e.key === 'Enter') handleSearch();
        });

        async function loadCSV() {
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                quizData = parseCSV(csvText);
            } catch (e) { console.error("Errore database."); }
        }

        function parseCSV(csv) {
            const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/g;
            return csv.split('\n').filter(l => l.trim() !== '').map(line => {
                return line.split(regex).map(col => col.replace(/^"|"$/g, '').trim());
            }).filter(col => col.length >= 8);
        }

        function handleSearch() {
            const txt = document.getElementById('searchText').value.trim().toLowerCase();
            const id = document.getElementById('searchId').value.trim().replace('#', '').toLowerCase();
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = '';
            if (!txt && !id) return;
            const filtered = quizData.filter(row => {
                const rowId = row[6] ? row[6].replace('#', '').trim().toLowerCase() : '';
                const rowTxt = row[0] ? row[0].toLowerCase() : '';
                return id ? rowId === id : rowTxt.includes(txt);
            });
            if (filtered.length > 0) { filtered.forEach(row => displayResult(row, resDiv)); }
            else { resDiv.innerHTML = '<p style="text-align:center;">Nessun risultato trovato.</p>'; }
        }

        function resetSearch() {
            document.getElementById('searchText').value = '';
            document.getElementById('searchId').value = '';
            document.getElementById('results').innerHTML = '<p style="text-align:center;">Pronto per nuova ricerca.</p>';
        }

        function displayResult(row, container) {
            const correctIdx = parseInt(row[5], 10);
            const resDiv = document.createElement('div');
            resDiv.className = 'quiz-result';
            let answersHtml = '<ul>';
            ['A', 'B', 'C', 'D'].forEach((label, i) => {
                if (row[i+1]) {
                    const isCorrect = i === correctIdx;
                    answersHtml += `<li class="${isCorrect ? 'correct-answer' : ''}">${label}. ${row[i+1]}</li>`;
                }
            });
            answersHtml += '</ul>';
            resDiv.innerHTML = `
                <div style="font-size:0.75rem; color:#f39c12; font-weight:bold;">${row[7] || 'PPL'}</div>
                <h3 style="margin:5px 0; font-size:1rem; color:var(--primary);">ID #${row[6]}</h3>
                <p style="margin-bottom:10px;">${row[0]}</p>
                ${answersHtml}
            `;
            container.appendChild(resDiv);
        }
    </script>
</body>
</html>
