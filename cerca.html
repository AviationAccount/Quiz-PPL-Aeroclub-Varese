<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ricerca Database Quiz PPL - Aeroclub Varese</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
        // CONFIGURAZIONE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDqy6CFoufHVlqT94GdurCMzcmPFv-VprM",
            authDomain: "quiz-ppl-varese.firebaseapp.com",
            projectId: "quiz-ppl-varese",
            storageBucket: "quiz-ppl-varese.firebasestorage.app",
            messagingSenderId: "784406293571",
            appId: "1:784406293571:web:dd28c5574910502891b8f6"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const auth = firebase.auth();
        const LOGIN_URL = "https://aviationaccount.github.io/Quiz-PPL-Aeroclub-Varese/";
        let quizData = []; 

        // CONTROLLO ACCESSO (Auth Guard)
        auth.onAuthStateChanged((user) => {
            const content = document.getElementById('protected-content');
            if (user) {
                // Utente loggato: mostra la pagina e carica il CSV
                if (content) content.style.display = 'block';
                if (quizData.length === 0) loadCSV();
            } else {
                // Utente NON loggato: reindirizzamento forzato
                window.location.replace(LOGIN_URL);
            }
        });

        async function logout() {
            try {
                await auth.signOut();
            } catch (error) {
                window.location.replace(LOGIN_URL);
            }
        }
    </script>

    <style>
        :root {
            --primary: #0072ff;
            --accent: #00d2ff;
            --dark-bg: #141E30;
            --dark-blue: #243B55;
            --success: #28a745;
            --danger: #dc3545;
            --white: #ffffff;
            --text-dark: #1e293b;
            --gray-light: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(120deg, var(--dark-bg), var(--dark-blue));
            color: var(--white);
            margin: 0;
            min-height: 100vh;
        }

        /* Il contenuto parte nascosto per sicurezza */
        #protected-content { 
            display: none; 
            padding: 40px 0; 
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .main-container {
            max-width: 1000px;
            width: 92%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            padding: 40px;
            box-sizing: border-box;
            color: var(--text-dark);
            margin: 0 auto;
        }

        .header-box { text-align: center; margin-bottom: 30px; position: relative; }
        
        .btn-logout { 
            position: absolute; top: 0; right: 0; background: #f1f5f9; 
            border: 1px solid #ddd; padding: 8px 15px; border-radius: 8px; 
            cursor: pointer; font-size: 0.8rem; font-weight: bold; color: var(--danger);
            transition: all 0.3s;
        }
        .btn-logout:hover { background: #fee2e2; border-color: var(--danger); }

        h1 { color: var(--primary); font-size: 1.8rem; margin: 10px 0; font-weight: 800; letter-spacing: -1px; }

        .search-container { 
            background-color: var(--gray-light);
            padding: 25px; border-radius: 16px; display: flex; 
            flex-wrap: wrap; gap: 15px; border: 1px solid #e2e8f0; margin-bottom: 30px;
        }

        .search-container input { 
            padding: 12px 15px; border: 2px solid #cbd5e1; border-radius: 10px; 
            font-size: 16px; flex-grow: 1; transition: all 0.3s;
        }
        .search-container input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(0,114,255,0.1); }

        .search-container button {
            padding: 0 25px; height: 48px; background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: transform 0.2s;
        }
        .search-container button:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .quiz-result {
            border: 1px solid #e2e8f0; padding: 25px; margin: 20px 0; 
            border-radius: 16px; background: white; text-align: left;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .subject-tag {
            background: linear-gradient(90deg, #f39c12, #e67e22); color: white; padding: 4px 12px; 
            border-radius: 6px; font-size: 0.75rem; font-weight: 800; margin-bottom: 10px; display: inline-block;
        }

        .correct-answer {
            background-color: #ecfdf5 !important; color: #065f46 !important;
            border: 1px solid #10b981 !important; font-weight: 600; padding: 12px; border-radius: 8px;
            margin: 8px 0; position: relative;
        }
        .correct-answer::after { content: "✓"; position: absolute; right: 15px; }

        ul { list-style: none; padding: 0; }
        li { padding: 10px; color: #475569; border-bottom: 1px solid #f1f5f9; border-radius: 6px; }

        footer { text-align: center; margin-top: 40px; font-size: 0.85rem; color: #94a3b8; padding-bottom: 40px; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="protected-content">
        <div class="main-container">
            <div class="header-box">
                <button class="btn-logout" onclick="logout()">LOGOUT</button>
                <img src="https://i.ibb.co/PHHxChW/unnamed.jpg" alt="Logo Aeroclub Varese" style="width: 100px;">
                <h1>Ricerca Database Quiz PPL</h1>
            </div>

            <div class="search-container">
                <input type="text" id="searchText" placeholder="Cerca parole chiave nel testo...">
                <input type="text" id="searchId" placeholder="Cerca per ID (es. 1001)">
                <button onclick="handleSearch()">Cerca</button>
                <button id="resetButton" onclick="resetSearch()" style="background:#cbd5e1; color:#444;">Reset</button>
            </div>

            <div id="results">
                <p style="text-align:center; color:#666;">Caricamento database aeronautico...</p>
            </div>
        </div>

        <footer>
            © 2026 by A.D per <strong>Aeroclub di Varese</strong>. <br>
            Tutti i diritti riservati. Contenuto protetto da copyright.
        </footer>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ7nj9UrBloRfIDxZkRUkxBu1neSuPIyaR4EjBWj90BLyDK3VkOBeqZSxe2pb1jwkE7mIEelHXhzayP/pub?output=csv';

        // Disabilita tasto destro e F12 per protezione contenuti
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J'))) e.preventDefault();
            if (e.key === 'Enter') handleSearch();
        });

        async function loadCSV() {
            const res = document.getElementById('results');
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                quizData = parseCSV(csvText);
                res.innerHTML = `<p style="text-align:center; color: var(--success); font-weight:bold;">Database Pronto: ${quizData.length} domande disponibili.</p>`;
            } catch (e) {
                res.innerHTML = '<p style="text-align:center; color:var(--danger);">Errore critico nella connessione al database CSV.</p>';
            }
        }

        function parseCSV(csv) {
            const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/g;
            return csv.split('\n').filter(l => l.trim() !== '').map(line => {
                return line.split(regex).map(col => col.replace(/^"|"$/g, '').trim());
            }).filter(col => col.length >= 8);
        }

        function handleSearch() {
            const txt = document.getElementById('searchText').value.trim().toLowerCase();
            const id = document.getElementById('searchId').value.trim().replace('#', '').toLowerCase();
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = '';

            if (!txt && !id) return;

            const filtered = quizData.filter(row => {
                const rowId = row[6] ? row[6].replace('#', '').trim().toLowerCase() : '';
                const rowTxt = row[0] ? row[0].toLowerCase() : '';
                return id ? rowId === id : rowTxt.includes(txt);
            });

            if (filtered.length > 0) {
                filtered.forEach(row => displayResult(row, resDiv));
            } else {
                resDiv.innerHTML = '<p style="text-align:center;">Nessuna domanda corrispondente trovata.</p>';
            }
        }

        function resetSearch() {
            document.getElementById('searchText').value = '';
            document.getElementById('searchId').value = '';
            document.getElementById('results').innerHTML = '<p style="text-align:center;">Database pronto per una nuova ricerca.</p>';
        }

        function displayResult(row, container) {
            const correctIdx = parseInt(row[5], 10);
            const resDiv = document.createElement('div');
            resDiv.className = 'quiz-result';
            
            let answersHtml = '<ul>';
            ['A', 'B', 'C', 'D'].forEach((label, i) => {
                if (row[i+1]) {
                    const isCorrect = i === correctIdx;
                    answersHtml += `<li class="${isCorrect ? 'correct-answer' : ''}">${label}. ${row[i+1]}</li>`;
                }
            });
            answersHtml += '</ul>';

            resDiv.innerHTML = `
                <div class="subject-tag">${row[7] || 'PPL GENERALE'}</div>
                <h3 style="margin:0 0 10px 0; font-size:1.1rem; color:var(--primary);">ID Domanda: #${row[6]}</h3>
                <p style="margin-bottom:15px; font-weight:500; line-height:1.5;">${row[0]}</p>
                ${answersHtml}
            `;
            container.appendChild(resDiv);
        }
    </script>
</body>
</html>
