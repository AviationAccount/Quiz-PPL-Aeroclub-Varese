<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creazione Account Aeroclub Varese Quiz</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* SFONDO SFOCATO CON IL NUOVO LINK */
        .background-blur {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 31, 63, 0.75), rgba(0, 31, 63, 0.75)), 
                        url('https://i.ibb.co/nqvwwYNv/Senza-titolo-2.jpg'); 
            background-size: cover;
            background-position: center;
            filter: blur(10px); 
            transform: scale(1.1);
            z-index: -1;
        }

        .reg-container { 
            background: rgba(255, 255, 255, 0.96); 
            border-radius: 30px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
            width: 90%;
            max-width: 450px; 
            text-align: center; 
            padding: 40px 30px;
            animation: fadeIn 0.8s ease-out;
            position: relative;
            z-index: 1;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* LOGO SOPRA IL FORM */
        .logo-header {
            width: 150px; 
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        h2 { color: #001f3f; margin: 0; font-size: 1.7em; font-weight: 800; }
        .subtitle { font-size: 0.9em; color: #555; margin-bottom: 25px; display: block; }

        input { 
            width: 100%; 
            padding: 14px 20px; 
            margin: 8px 0; 
            border: 1.5px solid #ddd; 
            border-radius: 50px; 
            box-sizing: border-box; 
            font-size: 1em;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus { border-color: #001f3f; box-shadow: 0 0 8px rgba(0,31,63,0.2); }

        button { 
            width: 100%; 
            padding: 16px; 
            background: #001f3f; 
            color: white; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1.1em;
            text-transform: uppercase; 
            margin-top: 20px; 
            transition: transform 0.2s, background 0.3s;
        }

        button:hover { background: #003366; transform: translateY(-2px); }

        .back-link { 
            display: block; 
            margin-top: 20px; 
            font-size: 0.95em; 
            color: #001f3f; 
            text-decoration: none; 
            font-weight: 500;
        }

        /* MODAL SUCCESSO */
        #success-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 31, 63, 0.95); z-index: 9999; justify-content: center; align-items: center;
        }
        .modal-content { background: white; padding: 40px; border-radius: 30px; width: 85%; max-width: 400px; text-align: center; }
        .creds-box { background: #f8fafc; padding: 20px; border-radius: 15px; margin: 20px 0; text-align: left; border-left: 6px solid #001f3f; }
        .label { font-size: 0.75em; color: #64748b; text-transform: uppercase; font-weight: bold; }
        .value { font-size: 1.1em; color: #1e293b; font-weight: bold; margin-bottom: 10px; word-break: break-all; }
    </style>
</head>
<body>

<div class="background-blur"></div>

<div id="success-modal">
    <div class="modal-content">
        <h2 style="color: #10b981;">✅ Registrazione OK!</h2>
        <p>Salva le tue credenziali:</p>
        <div class="creds-box">
            <p class="label">Email</p>
            <p id="display-email" class="value"></p>
            <p class="label">Password</p>
            <p id="display-pass" class="value" style="margin-bottom:0;"></p>
        </div>
        <button onclick="window.location.href='index.html'">Vai al Login</button>
    </div>
</div>

<div class="reg-container">
    <img src="https://i.ibb.co/nqvwwYNv/Senza-titolo-2.jpg" class="logo-header" alt="Logo Quiz PPL">
    
    <h2>Nuovo Account Quiz</h2>
    <span class="subtitle">PPL Quiz Account Creation</span>
    
    <input type="text" id="nome" placeholder="Nome / First Name">
    <input type="text" id="cognome" placeholder="Cognome / Last Name">
    <input type="email" id="email-reale" placeholder="Email Personale / Personal Email">
    <input type="number" id="corso" placeholder="Numero Corso PPL / PPL Course Number">
    <input type="password" id="password" placeholder="Scegli Password / Choose Password">
    
    <button onclick="handleRegister()">Crea Account / Create Account</button>
    <a href="index.html" class="back-link">← Torna al Login / Back to Login</a>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDqy6CFoufHVlqT94GdurCMzcmPFv-VprM",
        authDomain: "quiz-ppl-varese.firebaseapp.com",
        projectId: "quiz-ppl-varese",
        storageBucket: "quiz-ppl-varese.firebasestorage.app",
        messagingSenderId: "784406293571",
        appId: "1:784406293571:web:dd28c5574910502891b8f6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function handleRegister() {
        const nome = document.getElementById('nome').value.trim();
        const cognome = document.getElementById('cognome').value.trim();
        const emailReale = document.getElementById('email-reale').value.trim();
        const corsoValue = document.getElementById('corso').value.trim();
        const password = document.getElementById('password').value;

        if(!nome || !cognome || !emailReale || !corsoValue || password.length < 6) {
            alert("Compila tutti i campi correttamente.");
            return;
        }

        try {
            const userCredential = await firebase.auth().createUserWithEmailAndPassword(emailReale, password);
            await db.collection("utenti").doc(userCredential.user.uid).set({
                nome: nome,
                cognome: cognome,
                emailPersonale: emailReale,
                username: emailReale,
                corsoPPL: corsoValue,
                dataRegistrazione: firebase.firestore.FieldValue.serverTimestamp()
            });

            document.getElementById('display-email').innerText = emailReale;
            document.getElementById('display-pass').innerText = password;
            document.getElementById('success-modal').style.display = 'flex';
            
        } catch (error) {
            alert("Errore: " + error.message);
        }
    }
</script>
</body>
</html>
